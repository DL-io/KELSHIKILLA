# Railway Deployment Configuration — Paper-Trading Mode
#
# Prerequisites on Railway:
#   1. Add Service → Deploy from GitHub → this repo
#   2. Add Service → Redis   ← REQUIRED for BullMQ workers
#   3. Add Service → MySQL   ← REQUIRED for operational state
#   4. Set environment variables (see RAILWAY.md and RAILWAY_ENV_VARS.md)
#
# Wire Railway service references for connection strings:
#   DATABASE_URL = ${{MySQL.MYSQL_URL}}
#   REDIS_URL    = ${{Redis.REDIS_URL}}
#
# Build steps are defined in nixpacks.toml so install/build are explicit.

[build]
builder = "nixpacks"

[deploy]
# Canonical runtime: server/_core/index.ts → express + tRPC + BotEngine
# (BullMQ workers in server/queue/workers.ts, websocket-first ingestion).
# Do not replace with a polling-only loop.
startCommand            = "node dist/index.js"
healthcheckPath         = "/health"
healthcheckTimeout      = 30
restartPolicyType       = "on_failure"
restartPolicyMaxRetries = 10
# BullMQ workers are stateful — keep a single replica so periodic jobs and
# lifecycle reconciliation do not double-fire.
numReplicas             = 1

[deploy.env]
# Non-secret defaults. Paper mode and live-trading gate are explicit and
# fail-closed: real exchange keys must be set in the Railway dashboard.
NODE_ENV                = "production"
TZ                      = "UTC"
EXECUTION_MODE          = "paper"
LIVE_TRADING_ENABLED    = "false"
KILLSWITCH_ARMED        = "false"
KALSHI_EXECUTION_MODE   = "paper"
KALSHI_KILLSWITCH_ARMED = "false"

[deploy.resources]
cpu    = 1000
memory = 1024
